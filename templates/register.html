<!DOCTYPE html>
<html lang="en" id="html-root">
<head>
<script>
// Auto dark mode from system preference
(function() {
  const savedPref = localStorage.getItem('darkMode');
  const systemDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
  const isDark = savedPref !== null ? savedPref === 'true' : systemDark;
  if (isDark) document.documentElement.classList.add('dark');
  window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', e => {
    if (localStorage.getItem('darkMode') === null) {
      if (e.matches) document.documentElement.classList.add('dark');
      else document.documentElement.classList.remove('dark');
    }
  });
})();
</script>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Register – SubManager</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet"/>
<script>
  tailwind.config = {
    darkMode: 'class',
    theme: { extend: { colors: { primary: "#136dec" }, fontFamily: { display: ["Inter"] } } }
  }
</script>
<style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-slate-50 dark:bg-slate-950 min-h-screen flex items-center justify-center transition-colors duration-200">

<div class="w-full max-w-md px-6">

  <!-- Logo -->
  <div class="flex items-center justify-center gap-3 mb-8">
    <div class="h-10 w-10 rounded-xl bg-primary flex items-center justify-center">
      <span class="material-symbols-outlined text-white">account_balance_wallet</span>
    </div>
    <span class="text-2xl font-extrabold text-slate-900 dark:text-slate-100">SubManager</span>
  </div>

  <div class="bg-white dark:bg-slate-900 rounded-2xl border border-slate-200 dark:border-slate-800 shadow-sm p-8">
    <h1 class="text-xl font-bold text-slate-900 dark:text-slate-100 mb-1">Create an account</h1>
    <p class="text-slate-500 dark:text-slate-400 text-sm mb-6">Start tracking your subscriptions</p>

    <!-- Flash messages -->
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, message in messages %}
        <div class="mb-4 px-4 py-3 rounded-lg text-sm font-medium
          {{ 'bg-red-50 text-red-600 border border-red-200' if category == 'error' else 'bg-emerald-50 text-emerald-600 border border-emerald-200' }}">
          {{ message }}
        </div>
      {% endfor %}
    {% endwith %}

    <form action="/register" method="POST" class="space-y-4">

      <div>
        <label class="text-xs font-semibold text-slate-500 dark:text-slate-400 uppercase tracking-wider mb-1.5 block">Username</label>
        <input name="username" type="text" placeholder="choose a username" required
          class="w-full border border-slate-200 dark:border-slate-700 dark:bg-slate-800 dark:text-slate-100 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-primary/40"/>
      </div>

      <div>
        <label class="text-xs font-semibold text-slate-500 dark:text-slate-400 uppercase tracking-wider mb-1.5 block">Password</label>
        <input name="password" type="password" placeholder="min. 6 characters" required
          class="w-full border border-slate-200 dark:border-slate-700 dark:bg-slate-800 dark:text-slate-100 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-primary/40"/>
      </div>

      <div>
        <label class="text-xs font-semibold text-slate-500 dark:text-slate-400 uppercase tracking-wider mb-1.5 block">Confirm Password</label>
        <input name="confirm_password" type="password" placeholder="repeat password" required
          class="w-full border border-slate-200 dark:border-slate-700 dark:bg-slate-800 dark:text-slate-100 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-primary/40"/>
      </div>

      <button type="submit"
        class="w-full bg-primary text-white font-semibold py-2.5 rounded-lg hover:bg-primary/90 transition-colors mt-2">
        Create Account
      </button>

    </form>

    <p class="text-center text-sm text-slate-500 dark:text-slate-400 mt-6">
      Already have an account?
      <a href="/login" class="text-primary font-semibold hover:underline">Sign in</a>
    </p>
  </div>
</div>

</body>
</html>
